<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrafficSim</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
    <main class="main-content">
        <section class="scene">
            <div class="intersection" id="intersection">
                <div class="road horizontal"></div>
                <div class="road vertical"></div>
                <div class="lane-line h"></div>
                <div class="lane-line v"></div>
                <div class="center-box"></div>
                <div class="stop-line n"></div>
                <div class="stop-line s"></div>
                <div class="stop-line e"></div>
                <div class="stop-line w"></div>
                <div class="light north" id="lightN"></div>
                <div class="light south" id="lightS"></div>
                <div class="light east" id="lightE"></div>
                <div class="light west" id="lightW"></div>
            </div>
        </section>
    </main>

    <aside class="sidebar">
        <header class="topbar">
            <h1>TrafficSim</h1>
            <p>4-way intersection with lane-separated traffic</p>
        </header>

        <section class="controls card">
            <button id="playBtn">Play</button>
            <button id="resetBtn">Reset</button>
            <label for="speedRange">Speed</label>
            <input id="speedRange" type="range" min="0.5" max="3" step="0.1" value="1" />
            <span id="speedLabel">1.0x</span>
        </section>

        <section class="dashboard">
            <article class="card metrics">
                <h2>Status</h2>
                <div>Running: <strong id="runningState">No</strong></div>
                <div>Green Light: <strong id="greenLight">NORTH</strong></div>
                <div>Total Cars Passed: <strong id="carsPassed">0</strong></div>
                <div>Active Threads: <strong id="threadCount">0</strong></div>
            </article>

            <article class="card queues">
                <h2>Queue Lengths</h2>
                <div>NORTH: <strong id="qN">0</strong></div>
                <div>SOUTH: <strong id="qS">0</strong></div>
                <div>EAST: <strong id="qE">0</strong></div>
                <div>WEST: <strong id="qW">0</strong></div>
            </article>
        </section>
    </aside>
</div>

<script src="/app.js"></script>
</body>
</html>
